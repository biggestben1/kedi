<VirtualHost *:80>
    ServerName my-laravel-app.test
    ServerAlias www.my-laravel-app.test
    DocumentRoot /home/hp/code/my-laravel-app/public

    <Directory /home/hp/code/my-laravel-app/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/my-laravel-app-error.log
    CustomLog ${APACHE_LOG_DIR}/my-laravel-app-access.log combined
</VirtualHost>
